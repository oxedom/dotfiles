# Terminal / color support (fixes TERM so shell PS1 colors + Kitty truecolor work)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch windows using Shift-arrow without prefix
bind -n S-Left previous-window
bind -n S-Right next-window

# Increase the scrollback buffer to a higher limit than the default 2000 lines
set -g history-limit 9999999

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=yellow bold'

# panes
set -g pane-border-style 'fg=yellow'
set -g pane-active-border-style 'fg=green'

# statusbar
set -g status-position top
set -g status-justify left
set -g status-style 'fg=colour250,bg=colour235'

set -g status-left '#[fg=colour232,bg=colour114,bold] #S #[fg=colour114,bg=colour235,nobold]'
set -g status-left-length 20

set -g status-right '#[fg=colour114,bg=colour235]#[fg=colour232,bg=colour114] #(tmux-mem-cpu-load) #[fg=colour167,bg=colour114]#[fg=colour232,bg=colour167] #(uptime | cut -f 4-5 -d " " | cut -f 1 -d ",") #[fg=colour109,bg=colour167]#[fg=colour232,bg=colour109] %a %l:%M:%S %p #[fg=colour110,bg=colour109]#[fg=colour232,bg=colour110] %Y-%m-%d '

setw -g window-status-current-style 'fg=colour232 bg=colour114 bold'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=colour114 bg=colour235'
setw -g window-status-format ' #I #[fg=colour250]#W #[fg=colour180]#F '

setw -g window-status-bell-style 'fg=colour232 bg=colour167 bold'

# messages
set -g message-style 'fg=colour232 bg=colour180 bold'

# ---------------------------------------------------------------- plugins
# Bootstrap tpm on a fresh machine so the lines below are never dead config.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone --depth 1 https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Survive an unclean reboot: snapshot every 5 min, restore on server start.
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Deliberately NOT adding claude/codex to @resurrect-processes. Relaunching them
# bare would start *fresh* sessions rather than the ones that were lost, which is
# worse than a plain shell. Restored panes come back in the right directory; then
# resume by session id (see skills/restoring-crashed-agent-sessions).

# Keep this last — tpm must load after all plugin declarations.
run '~/.tmux/plugins/tpm/tpm'
